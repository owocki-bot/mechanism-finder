<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#02E2AC;--bg:#0a0a0f;--card:#14141f;--card2:#1a1a2e;--text:#e0e0e0;--muted:#888;--red:#ff4757;--yellow:#ffa502;--greenBadge:#2ed573}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--green);text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:900px;margin:0 auto;padding:20px}
header{text-align:center;padding:40px 20px 20px}
header h1{font-size:2.4em;color:#fff;margin-bottom:8px}
header h1 span{color:var(--green)}
header p{color:var(--muted);font-size:1.1em}
.sliders{background:var(--card);border-radius:16px;padding:28px;margin:24px 0}
.slider-group{margin-bottom:20px}
.slider-group:last-child{margin-bottom:0}
.slider-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:.95em}
.slider-label span:first-child{font-weight:600;color:#fff}
.slider-label span:last-child{color:var(--green);font-weight:500}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:#2a2a3e;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--green);cursor:pointer;box-shadow:0 0 10px rgba(2,226,172,.4)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--green);cursor:pointer;border:none}
.results{margin:24px 0}
.results h2{font-size:1.4em;color:#fff;margin-bottom:16px}
.stack-card{background:var(--card);border-radius:16px;padding:24px;margin-bottom:16px;border:1px solid #222;transition:all .3s ease}
.stack-card:hover{border-color:var(--green);box-shadow:0 0 20px rgba(2,226,172,.1)}
.stack-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.stack-name{font-size:1.25em;font-weight:700;color:#fff}
.confidence{font-size:.85em;padding:4px 10px;border-radius:20px;font-weight:600}
.confidence.green{background:rgba(46,213,115,.15);color:var(--greenBadge)}
.confidence.yellow{background:rgba(255,165,2,.15);color:var(--yellow)}
.confidence.red{background:rgba(255,71,87,.15);color:var(--red)}
.flow{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin:16px 0;padding:16px;background:var(--card2);border-radius:12px}
.flow a{background:rgba(2,226,172,.1);padding:6px 14px;border-radius:8px;font-weight:600;font-size:.95em;white-space:nowrap}
.flow .arrow{color:var(--green);font-size:1.2em;font-weight:bold}
.stack-why{color:var(--muted);font-size:.95em;line-height:1.5}
.score-bar{display:flex;align-items:center;gap:8px;margin-top:10px}
.score-bar span{font-size:.8em;color:var(--muted)}
.score-fill{height:4px;border-radius:2px;background:var(--green);transition:width .4s ease}
.score-track{flex:1;height:4px;border-radius:2px;background:#2a2a3e}
.deep-dive{overflow:hidden;max-height:0;transition:max-height .4s ease;padding:0 4px}
.deep-dive.open{max-height:600px}
.deep-dive-content{padding-top:16px;border-top:1px solid #2a2a3e;margin-top:16px}
.deep-dive-content h4{color:#fff;font-size:.95em;margin-bottom:8px}
.deep-dive-content p,.deep-dive-content li{color:var(--muted);font-size:.9em}
.deep-dive-content ul{padding-left:18px;margin-bottom:12px}
.expand-btn{background:none;border:1px solid #333;color:var(--muted);padding:6px 16px;border-radius:8px;cursor:pointer;font-size:.85em;margin-top:12px;transition:all .2s}
.expand-btn:hover{border-color:var(--green);color:var(--green)}
footer{text-align:center;padding:40px 20px;color:var(--muted);font-size:.9em}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--green);color:var(--bg);font-weight:800;font-size:.85em;margin-right:10px;flex-shrink:0}
@media(max-width:600px){
  header h1{font-size:1.6em}
  .container{padding:12px}
  .sliders{padding:18px}
  .flow{flex-direction:column;align-items:flex-start}

</style>
</head>

  'coordinape':'Coordinape','deepfunding':'DeepFunding','drips':'Drips',
  'ethereum-foundation-esp':'Ethereum Foundation ESP','flows-wtf':'Flows.wtf',
  'gardens-v2':'Gardens','gitcoin-grants-stack':'Gitcoin Grants Stack','giveth':'Giveth',
  'juicebox':'Juicebox','karma-gap':'Karma GAP','markee':'Markee','nouns-dao':'Nouns DAO',
  'octant':'Octant','opensource-observer':'Open Source Observer','optimism-retropgf':'Optimism RetroPGF',
  'polygon-grants':'Polygon Grants','protocol-guild':'Protocol Guild','revnets':'Revnets',
  'sablier':'Sablier','scroll-grants':'Scroll Grants','superfluid':'Superfluid','tea-protocol':'Tea Protocol'
};

// Gaussian-ish range scoring: how well does value fit in [lo,hi] range (1-5 scale)
function g(val, range) {
  if (val >= range[0] && val <= range[1]) return 1;
  const dist = val < range[0] ? range[0] - val : val - range[1];
  return Math.max(0, 1 - dist * 0.35);
}

function getSliders() {
  return {
    b: +document.getElementById('s-budget').value,
    c: +document.getElementById('s-community').value,
    d: +document.getElementById('s-decision').value,
    t: +document.getElementById('s-timing').value,
    x: +document.getElementById('s-complexity').value
  };
}

function updateLabels(s) {
  document.getElementById('v-budget').textContent = LABELS.budget[s.b-1];
  document.getElementById('v-community').textContent = LABELS.community[s.c-1];
  document.getElementById('v-decision').textContent = LABELS.decision[s.d-1];
  document.getElementById('v-timing').textContent = LABELS.timing[s.t-1];
  document.getElementById('v-complexity').textContent = LABELS.complexity[s.x-1];
}

function updateHash(s) {
  history.replaceState(null, '', '#b='+s.b+'&c='+s.c+'&d='+s.d+'&t='+s.t+'&x='+s.x);
}

function parseHash() {
  const h = location.hash.slice(1);
  if (!h) return null;
  const p = {};
  h.split('&').forEach(kv => { const [k,v] = kv.split('='); p[k] = +v; });
  if (p.b && p.c && p.d && p.t && p.x) return p;
  return null;
}

function render() {
  const s = getSliders();
  updateLabels(s);
  updateHash(s);

  const scored = STACKS.map(st => ({
    ...st,
    totalScore: st.score(s.b, s.c, s.d, s.t, s.x)
  })).sort((a,b) => b.totalScore - a.totalScore);

  const maxScore = scored[0].totalScore || 1;
  const top3 = scored.slice(0, 3);
  const container = document.getElementById('results-container');

  container.innerHTML = top3.map((st, i) => {
    const pct = Math.round(st.totalScore / maxScore * 100);
    const confEmoji = st.confidence === 'green' ? '🟢' : st.confidence === 'yellow' ? '🟡' : '🔴';
    const csLinks = st.caseStudies.length ? st.caseStudies.map(slug =>
      `<li><a href="https://gitcoin.co/case-studies/${slug}" target="_blank">${CS[slug] || slug}</a></li>`
    ).join('') : '<li>No case studies yet — this is frontier territory</li>';
    const appLinks = st.apps.map(slug =>
      `<a href="https://gitcoin.co/apps/${slug}" target="_blank">${APPS[slug] || slug}</a>`
    ).join(' • ');

    return `<div class="stack-card">
      <div class="stack-header">
        <div style="display:flex;align-items:center"><span class="rank-badge">${i+1}</span><span class="stack-name">${st.name}</span></div>
        <span class="confidence ${st.confidence}">${confEmoji} ${st.confidenceLabel}</span>
      </div>
      <div class="flow">${st.mechanisms.map((m,j) =>
        (j > 0 ? '<span class="arrow">→</span>' : '') +
        `<a href="https://gitcoin.co/mechanisms/${m.slug}" target="_blank">${m.name}</a>`
      ).join('')}</div>
      <p class="stack-why">${st.why}</p>
      <div class="score-bar"><span>Match</span><div class="score-track"><div class="score-fill" style="width:${pct}%"></div></div><span>${pct}%</span></div>
      <button class="expand-btn" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'▲ Less':'▼ Deep Dive'">▼ Deep Dive</button>
      <div class="deep-dive"><div class="deep-dive-content">
        <h4>📚 Related Case Studies</h4><ul>${csLinks}</ul>
        <h4>⚙️ Setup Complexity</h4><p>${st.setupComplexity}</p>
        <h4>⚠️ Failure Modes</h4><ul>${st.failureModes.map(f=>'<li>'+f+'</li>').join('')}</ul>
        <h4>🛠️ Implementing Apps</h4><p>${appLinks}</p>
      </div></div>
    </div>`;
  }).join('');
}

// Init
const saved = parseHash();
if (saved) {
  document.getElementById('s-budget').value = saved.b;
  document.getElementById('s-community').value = saved.c;
  document.getElementById('s-decision').value = saved.d;
  document.getElementById('s-timing').value = saved.t;
  document.getElementById('s-complexity').value = saved.x;
}
document.querySelectorAll('input[type=range]').forEach(el => el.addEventListener('input', render));
render();
</script>
</body>
</html>
